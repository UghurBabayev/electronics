spring:
  profiles:
    active: ${APP_PROFILE:dev}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: dev-secret-key-change-this-in-production-min-64-chars!!
    expiration-ms: 86400000