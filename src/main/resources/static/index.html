<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elektronika idarəetmə</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .nav-badge {
            background: var(--danger);
            color: #fff;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            margin-left: auto;
            line-height: 16px;
        }
    </style>
</head>
<body>
<div class="app">

    <!-- MOBİL HEADER -->
    <header class="mobile-header">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="Menyu">
            <span></span><span></span><span></span>
        </button>
        <span class="mobile-title">Elektronika</span>
        <div class="sidebar-avatar" id="mobile-avatar" style="width:32px;height:32px;font-size:13px">A</div>
    </header>

    <!-- OVERLAY -->
    <div class="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2"/>
                <path d="M8 21h8M12 17v4"/>
            </svg>
            Elektronika
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-title">Əsas</div>
            <button class="nav-item" data-page="dashboard" onclick="navigate('dashboard')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                Ana Səhifə
            </button>
            <button class="nav-item" data-page="reports" onclick="navigate('reports')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/>
                </svg>
                Hesabatlar
            </button>
            <button class="nav-item" data-page="products" onclick="navigate('products')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                </svg>
                Məhsullar
            </button>
            <button class="nav-item" data-page="sales" onclick="navigate('sales')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                Satışlar
            </button>
            <button class="nav-item" data-page="installments" onclick="navigate('installments')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="5" width="20" height="14" rx="2"/>
                    <line x1="2" y1="10" x2="22" y2="10"/>
                </svg>
                Nisiyə
                <span class="nav-badge" id="overdue-badge" style="display:none">0</span>
            </button>
            <button class="nav-item" data-page="customers" onclick="navigate('customers')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Müştərilər
            </button>
            <button class="nav-item" data-page="models" onclick="navigate('models')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="7" width="20" height="14" rx="2"/>
                    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
                </svg>
                Modellər
            </button>

            <div class="nav-section-title" style="margin-top:8px">Sistem</div>
            <button class="nav-item" data-page="settings" onclick="navigate('settings')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                Ayarlar
            </button>
        </nav>

        <div class="sidebar-user">
            <div class="sidebar-avatar" id="user-avatar">A</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="user-name">İstifadəçi</div>
                <div class="sidebar-user-role" id="user-role">—</div>
            </div>
            <button class="logout-btn" onclick="logout()" title="Çıxış">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <div id="content">
            <div style="color:var(--text-muted);padding:40px;text-align:center">Yüklənir...</div>
        </div>
    </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/dashboard.js"></script>
<script src="/js/products.js"></script>
<script src="/js/sales.js"></script>
<script src="/js/installments.js"></script>
<script src="/js/customers.js"></script>
<script src="/js/reports.js"></script>
<script src="/js/models.js"></script>
<script src="/js/settings.js"></script>
<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login.html';

    const user = JSON.parse(localStorage.getItem('user') || '{}');
    document.getElementById('user-name').textContent  = user.fullName || user.username || '—';
    document.getElementById('user-role').textContent  = user.role === 'ADMIN' ? 'Admin' : 'İstifadəçi';
    const initial = (user.fullName || user.username || 'U')[0].toUpperCase();
    document.getElementById('user-avatar').textContent = initial;
    document.getElementById('mobile-avatar').textContent = initial;

    const loaders = {
        dashboard:    loadDashboard,
        reports:      loadReports,
        products:     loadProducts,
        sales:        loadSales,
        installments: loadInstallments,
        customers:    loadCustomers,
        models:       loadModels,
        settings:     loadSettings
    };

    function navigate(page) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
        loaders[page]?.();
        closeSidebar();
    }

    function toggleSidebar() {
        document.querySelector('.sidebar').classList.toggle('open');
        document.querySelector('.sidebar-overlay').classList.toggle('open');
    }

    function closeSidebar() {
        document.querySelector('.sidebar').classList.remove('open');
        document.querySelector('.sidebar-overlay').classList.remove('open');
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/login.html';
    }

    function today() {
        return new Date().toISOString().slice(0, 10);
    }

    function firstOfMonth() {
        const d = new Date();
        return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().slice(0, 10);
    }

    // Başlanğıc səhifə
    navigate('dashboard');
</script>
</body>
</html>
